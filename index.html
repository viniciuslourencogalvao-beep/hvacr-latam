<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVACR LATAM — Radar Semanal</title>
<style>
  :root { color-scheme: light; --bg:#f4f6f9;--card:#ffffff;--header-bg:#0d1b2a;--header-accent:#1e88e5;--text:#1a1a2e;--text-muted:#6b7280;--border:#e5e7eb;--badge-market:#1e88e5;--badge-reg:#43a047;--badge-brand:#e53935;--badge-event:#fb8c00;--tag-bg-market:#e3f2fd;--tag-bg-reg:#e8f5e9;--tag-bg-brand:#ffebee;--tag-bg-event:#fff3e0;--shadow:0 1px 4px rgba(0,0,0,0.08); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
  header{background:var(--header-bg);color:#fff;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .header-left{display:flex;flex-direction:column;gap:4px}
  .header-title{font-size:1.25rem;font-weight:700}
  .header-sub{font-size:0.78rem;color:#90caf9}
  .header-meta{font-size:0.72rem;color:#78909c;margin-top:2px}
  .lang-switcher{display:flex;gap:6px}
  .lang-btn{background:transparent;border:1.5px solid #455a64;color:#90caf9;padding:5px 14px;border-radius:20px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.15s}
  .lang-btn.active{background:var(--header-accent);border-color:var(--header-accent);color:#fff}
  .toolbar{padding:16px 28px 0;display:flex;gap:8px;flex-wrap:wrap}
  .filter-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text-muted);padding:5px 16px;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.15s}
  .filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:16px 28px 32px}
  .period-heading{grid-column:1/-1;font-size:0.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;padding:18px 4px 2px;border-bottom:2px solid var(--border)}
  .period-heading:first-child{padding-top:4px}
  .news-card{background:var(--card);border-radius:10px;box-shadow:var(--shadow);border:1px solid var(--border);padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:box-shadow 0.15s,transform 0.15s}
  .news-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);transform:translateY(-2px)}
  .card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
  .badge-market{background:var(--tag-bg-market);color:var(--badge-market)}
  .badge-reg{background:var(--tag-bg-reg);color:var(--badge-reg)}
  .badge-brand{background:var(--tag-bg-brand);color:var(--badge-brand)}
  .badge-event{background:var(--tag-bg-event);color:var(--badge-event)}
  .card-num{font-size:0.7rem;font-weight:700;color:#d1d5db}
  .card-title{font-size:0.95rem;font-weight:700;line-height:1.35;color:var(--text)}
  .card-body{font-size:0.82rem;color:var(--text-muted);line-height:1.6}
  .card-date{font-size:0.68rem;color:#9ca3af;font-weight:600}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)}
  .card-source{font-size:0.7rem;color:#9ca3af;font-style:italic}
  .card-link{font-size:0.7rem;color:var(--header-accent);text-decoration:none;font-weight:600}
  .count-bar{padding:8px 28px 0;font-size:0.75rem;color:var(--text-muted)}
  .count-bar span{font-weight:700;color:var(--text)}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="header-title">📡 HVACR LATAM — Radar Semanal</div>
    <div class="header-sub" id="header-sub"></div>
    <div class="header-meta" id="header-meta"></div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
  </div>
</header>
<div class="toolbar">
  <button class="filter-btn active" onclick="setFilter('all')" id="btn-all"></button>
  <button class="filter-btn" onclick="setFilter('event')" id="btn-event"></button>
  <button class="filter-btn" onclick="setFilter('market')" id="btn-market"></button>
  <button class="filter-btn" onclick="setFilter('reg')" id="btn-reg"></button>
  <button class="filter-btn" onclick="setFilter('brand')" id="btn-brand"></button>
</div>
<div class="count-bar" id="count-bar"></div>
<div class="news-grid" id="grid"></div>
<script>
// DADOS — notícias verificadas, todas com publicação real ≤ 60 dias da data de execução (29/06/2026)
const news = [
  {
    cat: 'event', date: '2026-06-27', period: 'week',
    pt: { title: 'ASHRAE Annual Conference 2026 começa em Austin', body: 'A conferência anual da ASHRAE ocorre de 27 de junho a 1º de julho em Austin (Texas), com programação técnica voltada a inteligência artificial, descarbonização de edifícios e inovações em sistemas de climatização — temas com forte repercussão na agenda regulatória da América Latina.' },
    en: { title: 'ASHRAE Annual Conference 2026 kicks off in Austin', body: 'ASHRAE\'s annual conference runs June 27–July 1 in Austin, Texas, with a technical program covering artificial intelligence, building decarbonization and innovations in HVAC systems — topics that carry over into Latin America\'s regulatory agenda.' },
    es: { title: 'La Conferencia Anual de ASHRAE 2026 inicia en Austin', body: 'La conferencia anual de ASHRAE se realiza del 27 de junio al 1 de julio en Austin, Texas, con un programa técnico centrado en inteligencia artificial, descarbonización de edificios e innovaciones en sistemas HVAC, temas con fuerte impacto en la agenda regulatoria de América Latina.' },
    source: 'ASHRAE',
    url: 'https://www.ashrae.org/conferences/2026-annual-conference-austin'
  },
  {
    cat: 'event', date: '2026-06-23', period: 'week',
    pt: { title: 'Faltam menos de 100 dias para a AHR Expo México 2026', body: 'A maior exposição de HVACR da América Latina reunirá mais de 440 expositores e 13 mil profissionais em Expo Guadalajara, de 29 de setembro a 1º de outubro, com foco em eficiência energética, automação e qualidade do ar.' },
    en: { title: 'Less than 100 days to go until AHR Expo Mexico 2026', body: 'Latin America\'s largest HVACR exhibition will bring together more than 440 exhibitors and 13,000 professionals at Expo Guadalajara, September 29–October 1, focused on energy efficiency, automation and air quality.' },
    es: { title: 'Faltan menos de 100 días para AHR Expo México 2026', body: 'La mayor exposición HVACR de América Latina reunirá a más de 440 expositores y 13 mil profesionales en Expo Guadalajara, del 29 de septiembre al 1 de octubre, con foco en eficiencia energética, automatización y calidad del aire.' },
    source: 'Mundo Ejecutivo',
    url: 'https://mundoejecutivo.com.mx/actualidad/faltan-menos-de-100-dias-para-la-exposicion-mas-grande-de-america-latina-del-sector-hvacr-la-cita-es-en-guadalajara/'
  },
  {
    cat: 'event', date: '2026-06-22', period: 'week',
    pt: { title: 'Aircon 2026 estreia em São Paulo integrada à Eletrolar Show', body: 'A primeira edição da Aircon ocorreu de 22 a 25 de junho no Distrito Anhembi, reunindo marcas de climatização e refrigeração da América Latina em torno de bombas de vácuo, gases de baixo GWP, automação e eficiência energética.' },
    en: { title: 'Aircon 2026 debuts in São Paulo alongside Eletrolar Show', body: 'The first edition of Aircon ran June 22-25 at Distrito Anhembi, bringing together Latin American HVAC-R brands around vacuum pumps, low-GWP gases, automation and energy efficiency.' },
    es: { title: 'Aircon 2026 debuta en São Paulo integrada a Eletrolar Show', body: 'La primera edición de Aircon se realizó del 22 al 25 de junio en el Distrito Anhembi, reuniendo a marcas de climatización y refrigeración de América Latina en torno a bombas de vacío, gases de bajo GWP, automatización y eficiencia energética.' },
    source: 'Aircon Fair',
    url: 'https://airconfair.com.br/en/home/'
  },
  {
    cat: 'reg', date: '2026-06-18', period: 'month',
    pt: { title: 'Chile avança na elaboração de norma para regular emissões de HFC', body: 'O Ministério do Meio Ambiente chileno avança na consulta técnica para uma futura Norma de Emissão de HFC, que deve incluir mecanismos de compensação e mercado de carbono alinhados à meta de neutralidade até 2050.' },
    en: { title: 'Chile advances rulemaking to regulate HFC emissions', body: 'Chile\'s Ministry of Environment is advancing technical consultation on a future HFC Emission Standard, which is expected to include carbon-offset and carbon-market mechanisms aligned with the country\'s 2050 carbon-neutrality target.' },
    es: { title: 'Chile avanza en la elaboración de una norma para regular las emisiones de HFC', body: 'El Ministerio del Medio Ambiente de Chile avanza en la consulta técnica para una futura Norma de Emisión de HFC, que contemplará mecanismos de compensación y mercado de carbono alineados con la meta de carbono neutralidad para 2050.' },
    source: 'ACR Latinoamérica',
    url: 'https://www.acrlatinoamerica.com/novedades/ultimas-noticias/22-empresas/21158-chile-avanza-en-la-elaboracion-de-una-norma-para-regular-las-emisiones-de-hfc.html'
  },
  {
    cat: 'brand', date: '2026-06-18', period: 'month',
    pt: { title: 'Refricon 2026 bate recorde de público no Costa Rica com marcas internacionais', body: 'A 10ª edição do congresso reuniu mais de 350 profissionais no Hotel Wyndham Herradura, com participação comercial de Hisense, Daikin, Aspen Pumps, Innes, Soler & Palau e outras sete marcas internacionais.' },
    en: { title: 'Refricon 2026 sets attendance record in Costa Rica with international brands', body: 'The 10th edition of the congress drew more than 350 professionals at the Wyndham Herradura Hotel, with commercial participation from Hisense, Daikin, Aspen Pumps, Innes, Soler & Palau and seven other international brands.' },
    es: { title: 'Refricon 2026 marca un récord de asistencia en Costa Rica con marcas internacionales', body: 'La décima edición del congreso reunió a más de 350 profesionales en el Hotel Wyndham Herradura, con participación comercial de Hisense, Daikin, Aspen Pumps, Innes, Soler & Palau y otras siete marcas internacionales.' },
    source: 'ACR Latinoamérica',
    url: 'https://www.acrlatinoamerica.com/novedades/ultimas-noticias/22-empresas/21157-refricon-2026-reunio-a-mas-de-350-profesionales-hvac-y-marca-un-nuevo-record-para-la-industria-en-costa-rica.html'
  },
  {
    cat: 'event', date: '2026-06-03', period: 'month',
    pt: { title: 'Congresso Acadêmico Refriaméricas 2026 terá foco em descarbonização', body: 'O eixo temático "Eficiência, descarbonização e transformação tecnológica em HVAC/R" vai reunir especialistas latino-americanos para discutir refrigerantes alternativos, automação, cadeia de frio e novos modelos de negócio sustentáveis.' },
    en: { title: 'Refriaméricas 2026 Academic Congress to focus on decarbonization', body: 'The theme "Efficiency, decarbonization and technological transformation in HVAC/R" will bring together Latin American experts to discuss alternative refrigerants, automation, the cold chain and new sustainable business models.' },
    es: { title: 'El Congreso Académico de Refriaméricas 2026 se enfocará en la descarbonización', body: 'El eje temático "Eficiencia, descarbonización y transformación tecnológica en HVAC/R" reunirá a expertos latinoamericanos para abordar refrigerantes alternativos, automatización, cadena de frío y nuevos modelos de negocio sostenibles.' },
    source: 'ACR Latinoamérica',
    url: 'https://www.acrlatinoamerica.com/novedades/ultimas-noticias/22-empresas/21151-eficiencia-descarbonizacion-y-transformacion-tecnologica-marcaran-la-agenda-del-congreso-academico-2026.html'
  }
];

const i18n={
  pt:{sub:'Principais notícias do mercado de climatização e refrigeração na América Latina',meta:'Notícias verificadas com publicação em até 60 dias · Atualizado em: 29/06/2026',all:'Todas',event:'🎪 Feiras & Eventos',market:'📈 Mercado',reg:'📋 Regulação',brand:'🏭 Fabricantes',showing:'Exibindo',news:'notícias',labels:{event:'Feira/Evento',market:'Mercado',reg:'Regulação',brand:'Fabricante'},source:'Fonte',readMore:'Leia mais →',periods:{week:'📅 Semana Passada',month:'🗓️ Este Mês',lastmonth:'📆 Mês Passado'}},
  en:{sub:'Top news from the HVACR market in Latin America',meta:'News verified as published within the last 60 days · Updated: 06/29/2026',all:'All',event:'🎪 Trade Shows',market:'📈 Market',reg:'📋 Regulation',brand:'🏭 Manufacturers',showing:'Showing',news:'news items',labels:{event:'Event',market:'Market',reg:'Regulation',brand:'Manufacturer'},source:'Source',readMore:'Read more →',periods:{week:'📅 Last Week',month:'🗓️ This Month',lastmonth:'📆 Last Month'}},
  es:{sub:'Principales noticias del mercado HVACR en América Latina',meta:'Noticias verificadas con publicación en los últimos 60 días · Actualizado: 29/06/2026',all:'Todas',event:'🎪 Ferias & Eventos',market:'📈 Mercado',reg:'📋 Regulación',brand:'🏭 Fabricantes',showing:'Mostrando',news:'noticias',labels:{event:'Feria/Evento',market:'Mercado',reg:'Regulación',brand:'Fabricante'},source:'Fuente',readMore:'Leer más →',periods:{week:'📅 Semana Pasada',month:'🗓️ Este Mes',lastmonth:'📆 Mes Pasado'}}
};
let currentLang='pt',activeFilter='all';
const periodOrder=['week','month','lastmonth'];
function setLang(l){currentLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));const t=i18n[l];document.getElementById('header-sub').textContent=t.sub;document.getElementById('header-meta').textContent=t.meta;document.getElementById('btn-all').textContent=t.all;document.getElementById('btn-event').textContent=t.event;document.getElementById('btn-market').textContent=t.market;document.getElementById('btn-reg').textContent=t.reg;document.getElementById('btn-brand').textContent=t.brand;renderGrid()}
function setFilter(f){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+f).classList.add('active');renderGrid()}
function renderGrid(){
  const t=i18n[currentLang];
  const filtered=(activeFilter==='all'?news:news.filter(n=>n.cat===activeFilter)).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('count-bar').innerHTML=`<span>${filtered.length}</span> ${t.news}`;
  let html='';
  let counter=0;
  periodOrder.forEach(p=>{
    const group=filtered.filter(n=>n.period===p);
    if(group.length===0) return;
    html+=`<div class="period-heading">${t.periods[p]}</div>`;
    group.forEach(n=>{
      counter++;
      const d=n[currentLang];
      html+=`<div class="news-card"><div class="card-top"><span class="badge badge-${n.cat}">${t.labels[n.cat]}</span><span class="card-num">#${counter}</span></div><div class="card-title">${d.title}</div><div class="card-body">${d.body}</div><div class="card-date">${n.date}</div><div class="card-footer"><span class="card-source">${t.source}: ${n.source}</span><a class="card-link" href="${n.url}" target="_blank">${t.readMore}</a></div></div>`;
    });
  });
  document.getElementById('grid').innerHTML=html;
}
setLang('pt');
</script>
</body>
</html>
