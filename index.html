function setLang(l) {
  lang.current = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const t = i18n[l];
  document.getElementById('header-sub').textContent = t.sub;
  document.getElementById('header-meta').textContent = t.meta;
  document.getElementById('btn-all').textContent = t.all;
  document.getElementById('btn-event').textContent = t.event;
  document.getElementById('btn-market').textContent = t.market;
  document.getElementById('btn-reg').textContent = t.reg;
  document.getElementById('btn-brand').textContent = t.brand;
  renderGrid();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + f).classList.add('active');
  renderGrid();
}

    const d = n[lang.current];
    const badgeClass = 'badge-' + n.cat;
    const badgeLabel = t.labels[n.cat];
    return `
      <div class="news-card" data-cat="${n.cat}">
        <div class="card-top">
          <span class="badge ${badgeClass}">${badgeLabel}</span>
          <span class="card-num">#${i + 1}</span>
        </div>
        <div class="card-title">${d.title}</div>
        <div class="card-body">${d.body}</div>
        <div class="card-footer">
          <span class="card-source">${t.source}: ${n.source}</span>
          <a class="card-link" href="${n.url}" target="_blank">${t.readMore}</a>
        </div>
      </div>`;
  }).join('');
  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state">Nenhuma notícia encontrada nesta categoria.</div>`;
  }
}

renderGrid();
</script>
</body>
</html>
